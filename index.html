<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Weather Pulse</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-900 text-white min-h-screen">

<div class="max-w-7xl mx-auto px-5 py-8">

    <!-- Heading -->

    <div class="text-center">

        <h1 class="text-4xl font-bold">

            🌦️ Weather Pulse

        </h1>

        <p class="text-gray-400 mt-2">

            Real-Time Weather Application

        </p>

    </div>


    <!-- Search Bar -->

    <div class="flex mt-10">

        <input

            id="cityInput"

            type="text"

            placeholder="Enter city name..."

            class="w-full bg-slate-800 border border-gray-600
                   px-5 py-3 rounded-l-lg
                   focus:outline-none
                   focus:border-blue-500">

        <button

            id="searchBtn"

            class="bg-blue-600
                   px-8
                   rounded-r-lg
                   hover:bg-blue-700">

            Search

        </button>
        <button
    id="locationBtn"
    class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700">

    📍 My Location

</button>

    </div>
    <p id="errorMessage"
   class="hidden text-red-500 text-center font-semibold mt-4">
    ❌ City Not Found. Please enter a correct city name.
</p>


    <!-- Current Weather -->

    <div class="grid lg:grid-cols-3 gap-5 mt-8">


        <!-- Main Weather Card -->

        <div class="bg-slate-800 p-7 rounded-xl">

            <h2
                id="cityName"
                class="text-3xl font-bold">

                Bengaluru

            </h2>


            <p class="text-gray-400">

                India

            </p>


            <img
    id="weatherIcon"
    src=""
    alt="Weather Icon"
    class="w-28 h-28 mt-6">

            <h3
                id="temperature"
                class="text-6xl font-bold mt-5">

                28°C

            </h3>


            <p
                id="weatherDescription"
                class="text-xl text-gray-300 mt-3">

                Cloudy

            </p>

        </div>


        <!-- Weather Information -->

        <div class="lg:col-span-2

                    grid

                    grid-cols-1

                    md:grid-cols-2

                    gap-5">


            <!-- Humidity -->

            <div class="bg-slate-800 p-7 rounded-xl">

                <p class="text-gray-400">

                    💧 Humidity

                </p>

                <h3
                    id="humidity"
                    class="text-2xl font-bold mt-3">

                    65%

                </h3>

            </div>


            <!-- Wind -->

            <div class="bg-slate-800 p-7 rounded-xl">

                <p class="text-gray-400">

                    💨 Wind Speed

                </p>

                <h3
                    id="wind"
                    class="text-2xl font-bold mt-3">

                    12 km/h

                </h3>

            </div>


            <!-- Pressure -->

            <div class="bg-slate-800 p-7 rounded-xl">

                <p class="text-gray-400">

                    🌡️ Pressure

                </p>

                <h3
                    id="pressure"
                    class="text-2xl font-bold mt-3">

                    1008 hPa

                </h3>

            </div>


            <!-- Visibility -->

            <div class="bg-slate-800 p-7 rounded-xl">

                <p class="text-gray-400">

                    👁️ Visibility

                </p>

                <h3
                    id="visibility"
                    class="text-2xl font-bold mt-3">

                    10 km

                </h3>

            </div>


        </div>

    </div>


    <!-- Hourly Forecast -->

    <h2 class="text-3xl font-bold mt-12">

        Hourly Forecast

    </h2>


    <div

        id="hourlyForecast"

        class="grid

               grid-cols-2

               md:grid-cols-4

               lg:grid-cols-6

               gap-5

               mt-6">


        <div class="bg-slate-800 p-6 rounded-xl text-center">

            <p>12:00 PM</p>

            <p class="text-4xl my-4">

                ☁️

            </p>

            <p class="font-bold">

                28°C

            </p>

        </div>


    </div>


    <!-- Five-Day Forecast -->

    <h2 class="text-3xl font-bold mt-12">

        5-Day Forecast

    </h2>

<div
    id="fiveDayForecast"
    class="grid grid-cols-2 lg:grid-cols-5 gap-4 mt-6">


        <div class="bg-slate-800 p-7 rounded-xl text-center">

            <h3>Monday</h3>
            <p class="text-4xl my-4">☀️ </p>

            <p class="text-xl font-bold">29°C </p>

        </div>


    </div>

</div>


<script src="script.js"></script>

</body>

</html>
